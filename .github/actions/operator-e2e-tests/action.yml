# Deploy test resources, integration tests, then conformance e2e (Ginkgo).
# Required env for conformance: GH_ORG, GH_TOKEN, QUAY_DOCKERCONFIGJSON, RELEASE_CATALOG_TA_QUAY_TOKEN.
# Optional: RELEASE_TA_OCI_STORAGE. QUAY_TOKEN should be empty for conformance (set in this action).
#
name: 'Operator E2E — tests'
description: 'deploy-test-resources.sh, integration go tests, conformance go tests with pipeline bundle env.'
inputs:
  konflux-repo-root:
    description: 'Absolute path to konflux-ci repository root.'
    required: true
  junit-report-path:
    description: 'Path for Ginkgo JUnit XML report.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Deploy test resources
      shell: bash
      env:
        SKIP_SAMPLE_COMPONENTS: 'true'
      run: bash "${{ inputs.konflux-repo-root }}/scripts/operator-e2e/run-deploy-test-resources.sh" "${{ inputs.konflux-repo-root }}"

    - name: Run integration tests
      shell: bash
      run: bash "${{ inputs.konflux-repo-root }}/scripts/operator-e2e/run-integration-tests.sh" "${{ inputs.konflux-repo-root }}"

    - name: Set conformance pipeline env (revision + bundle)
      shell: bash
      run: bash "${{ inputs.konflux-repo-root }}/scripts/operator-e2e/prepare-conformance-env.sh" "${{ inputs.konflux-repo-root }}"

    - name: Run E2E tests
      shell: bash
      env:
        GH_ORG: ${{ env.GH_ORG }}
        GH_TOKEN: ${{ env.GH_TOKEN }}
        GITHUB_TOKEN: ${{ env.GH_TOKEN }}
        MY_GITHUB_ORG: ${{ env.GH_ORG }}
        QUAY_TOKEN: ''
        QUAY_DOCKERCONFIGJSON: ${{ env.QUAY_DOCKERCONFIGJSON }}
        RELEASE_CATALOG_TA_QUAY_TOKEN: ${{ env.RELEASE_CATALOG_TA_QUAY_TOKEN }}
        RELEASE_TA_OCI_STORAGE: ${{ env.RELEASE_TA_OCI_STORAGE }}
        E2E_APPLICATIONS_NAMESPACE: user-ns2
      run: |
        REPORT="${{ inputs.junit-report-path }}"
        if [[ -z "$REPORT" ]]; then
          REPORT="${{ github.workspace }}/junit-conformance.xml"
        fi
        bash "${{ inputs.konflux-repo-root }}/scripts/operator-e2e/run-conformance-tests.sh" "${{ inputs.konflux-repo-root }}" "$REPORT"
