# Test split operator e2e actions (no overrides). Same flow as run-operator-e2e meta-action.
#
name: Operator E2E (action, no overrides)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  e2e:
    name: E2E (no overrides)
    runs-on: ubuntu-latest
    env:
      GITHUB_APP_ID: ${{ secrets.APP_ID }}
      GITHUB_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
      WEBHOOK_SECRET: ${{ secrets.APP_WEBHOOK_SECRET }}
      GH_ORG: ${{ secrets.GH_ORG }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
      QUAY_ORGANIZATION: ${{ secrets.QUAY_ORG }}
      QUAY_DOCKERCONFIGJSON: ${{ secrets.QUAY_DOCKERCONFIGJSON }}
      RELEASE_CATALOG_TA_QUAY_TOKEN: ${{ secrets.RELEASE_CATALOG_TA_QUAY_TOKEN }}
      RELEASE_TA_OCI_STORAGE: quay.io/yftacherzog-konflux/trusted-artifacts
      SMEE_CHANNEL: ${{ secrets.SMEE_CHANNEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prep
        uses: ./.github/actions/operator-e2e-prep
        with:
          konflux-repo-root: ${{ github.workspace }}
          runner-arch: amd64

      - name: Deploy
        uses: ./.github/actions/operator-e2e-deploy
        with:
          konflux-repo-root: ${{ github.workspace }}
          konflux-ready-timeout: 15m

      - name: Tests
        if: success()
        uses: ./.github/actions/operator-e2e-tests
        with:
          konflux-repo-root: ${{ github.workspace }}
          junit-report-path: ${{ github.workspace }}/junit-conformance.xml

      - name: Logs
        if: always()
        uses: ./.github/actions/operator-e2e-logs
        with:
          konflux-repo-root: ${{ github.workspace }}
          junit-report-path: ${{ github.workspace }}/junit-conformance.xml
          upload-artifact: 'false'
