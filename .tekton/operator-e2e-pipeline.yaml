# Prototype: Kind on AWS (tekton-integration-catalog) → clone konflux-ci → operator E2E
# (overrides optional) → deprovision. Aligns with docs/operator-e2e-environments.md and
# GitHub operator-e2e actions.
#
# Before running: build/push the operator image for the PR revision and pass it as
# param operator-image (same pattern as PAC build-pipeline output). This pipeline does
# not build the operator image.
#
# Task paths follow the integration-catalog layout used in community pipelines, e.g.:
# https://github.com/flacatus/build-service/blob/separate_build_service_suite2/integration-tests/pipelines/konflux-e2e-tests-github.yaml
#
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: operator-e2e-pipeline
spec:
  description: >-
    Provision Kind (AWS), clone konflux-ci, run deploy-local.sh (skip in-cluster Kind)
    with optional manifest overrides, integration + conformance scripts, then deprovision.
  params:
    - name: git-url
      type: string
      description: konflux-ci git URL
      default: https://github.com/konflux-ci/konflux-ci.git
    - name: revision
      type: string
      description: Git commit SHA, branch, or tag to test
    - name: operator-image
      type: string
      description: Pullable operator image (must match revision / overrides strategy)
    - name: overrides-yaml
      type: string
      description: >-
        Optional YAML for apply-overrides-from-yaml.sh (empty string to skip). Do not embed
        secrets; pipeline params are persisted on PipelineRuns/TaskRuns and are not treated as confidential.
      default: ""
    - name: konflux-ready-timeout
      type: string
      default: "30m"
    - name: oci-container-repo
      type: string
      description: OCI artifact prefix for provision task (logs/state); no tag suffix here
      default: quay.io/example/konflux-operator-e2e-artifacts
    - name: konflux-test-infra-secret
      type: string
      description: Secret with credentials expected by kind-aws-provision / OCI upload
      default: konflux-test-infra
    - name: aws-credentials-secret
      type: string
      description: AWS credentials secret name for kind-aws-provision
      default: konflux-mapt-us-east-1
    - name: deprovision-aws-credentials-secret
      type: string
      description: AWS secret for kind-aws-deprovision (often same as provision; override if your catalog differs)
      default: konflux-mapt-us-east-1
    - name: release-ta-oci-storage
      type: string
      description: Optional OCI ref for conformance trusted-artifacts
      default: ""
    - name: catalog-url
      type: string
      default: https://github.com/konflux-ci/tekton-integration-catalog.git
    - name: catalog-revision
      type: string
      default: main
    - name: snapshot-json
      type: string
      description: JSON for test-metadata task (PAC / component snapshot shape)
      default: '{"components":[{"name":"konflux-ci","containerImage":"quay.io/konflux-ci/konflux-operator:latest"}]}'
  workspaces:
    - name: source
    - name: git-auth
  tasks:
    - name: test-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.catalog-url)
          - name: revision
            value: $(params.catalog-revision)
          - name: pathInRepo
            value: tasks/test-metadata/0.4/test-metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.snapshot-json)
        - name: test-name
          value: $(context.pipelineRun.name)
    - name: provision-kind-cluster
      runAfter:
        - test-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.catalog-url)
          - name: revision
            value: $(params.catalog-revision)
          - name: pathInRepo
            value: tasks/mapt-oci/kind-aws-spot/provision/0.2/kind-aws-provision.yaml
      params:
        - name: secret-aws-credentials
          value: $(params.aws-credentials-secret)
        - name: cluster-access-secret-name
          value: kfg-$(context.pipelineRun.name)
        - name: id
          value: $(context.pipelineRun.name)
        - name: tags
          value: owner=konflux-ci,project=konflux-ci,created-by=operator-e2e-pipeline
        - name: debug
          value: "false"
        - name: ownerKind
          value: PipelineRun
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
        - name: oci-ref
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: oci-credentials
          value: $(params.konflux-test-infra-secret)
        # Same encoding as flacatus/build-service integration-tests/pipelines/konflux-e2e-tests-github.yaml
        # (folded scalar + escaped quotes) for kind-aws-provision 0.2 extra-port-mappings.
        - name: extra-port-mappings
          value: >-
            '[{\"containerPort\":30012,\"hostPort\":8180,\"protocol\":\"TCP\"}]'
        - name: cpus
          value: "16"
        - name: memory
          value: "32"
        - name: spot
          value: "false"
        - name: harden-control-plane
          value: "true"
    - name: clone-repository
      workspaces:
        - name: output
          workspace: source
        - name: basic-auth
          workspace: git-auth
      taskSpec:
        workspaces:
          - name: output
          - name: basic-auth
            optional: true
        params:
          - name: url
            type: string
          - name: revision
            type: string
        steps:
          - name: clone
            image: quay.io/konflux-ci/task-runner:0.2.0@sha256:ba65585f5c8b0a74dc51590e95961765322427d1d62ccd4eb742ff0442291985
            script: |
              #!/bin/sh
              set -eu
              OUT="$(workspaces.output.path)"
              cd "$OUT"
              find . -mindepth 1 -maxdepth 1 -exec rm -rf {} + 2>/dev/null || true
              git init -q
              git remote add origin "$(params.url)"
              git fetch -q --depth=1 origin "$(params.revision)"
              git checkout -q FETCH_HEAD
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.revision)
    - name: konflux-operator-e2e
      runAfter:
        - provision-kind-cluster
        - clone-repository
      taskRef:
        kind: Task
        name: konflux-ci-operator-e2e
      workspaces:
        - name: source
          workspace: source
      params:
        - name: cluster-access-secret
          value: kfg-$(context.pipelineRun.name)
        - name: operator-image
          value: $(params.operator-image)
        - name: overrides-yaml
          value: $(params.overrides-yaml)
        - name: konflux-ready-timeout
          value: $(params.konflux-ready-timeout)
        - name: release-ta-oci-storage
          value: $(params.release-ta-oci-storage)
  finally:
    - name: deprovision-kind-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.catalog-url)
          - name: revision
            value: $(params.catalog-revision)
          - name: pathInRepo
            value: tasks/mapt-oci/kind-aws-spot/deprovision/0.1/kind-aws-deprovision.yaml
      params:
        - name: secret-aws-credentials
          value: $(params.deprovision-aws-credentials-secret)
        - name: id
          value: $(context.pipelineRun.name)
        - name: cluster-access-secret
          value: kfg-$(context.pipelineRun.name)
        - name: oci-container
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: oci-credentials
          value: $(params.konflux-test-infra-secret)
